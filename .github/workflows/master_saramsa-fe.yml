name: Saramsa-frontend (master)

on:
  push:
    branches:
      - master
    paths:
      - 'saramsa-ai/**'
      - '.github/workflows/master_saramsa-fe.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: saramsa-ai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saramsa-ai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone
        env:
          NEXT_PUBLIC_API_URL: https://saramsa-backend-h6b6edbjbcawbnee.centralus-01.azurewebsites.net/api
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir -p ../artifact
          cp -r .next/standalone/. ../standalone/
          cp -r .next/static ../standalone/.next/static
          cp -r public ../standalone/public 2>/dev/null || true
          cd ../standalone
          zip -r ../artifact/frontend.zip .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: artifact/frontend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: artifact

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'saramsa-fe'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_FE_PUBLISH_PROFILE }}
          package: artifact/frontend.zip
