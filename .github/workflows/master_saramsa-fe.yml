name: Saramsa-frontend (master)

on:
  push:
    branches:
      - master
    paths:
      - 'saramsa-ai/**'
      - '.github/workflows/master_saramsa-fe.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: saramsa-ai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saramsa-ai/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: saramsa-ai/.next/cache
          key: nextjs-${{ hashFiles('saramsa-ai/package-lock.json') }}-${{ hashFiles('saramsa-ai/src/**') }}
          restore-keys: |
            nextjs-${{ hashFiles('saramsa-ai/package-lock.json') }}-
            nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Resolve frontend API env
        env:
          NEXT_PUBLIC_API_URL_SECRET: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_BASE_URL_SECRET: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_API_URL_VAR: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_BASE_URL_VAR: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL_SECRET: ${{ secrets.API_BASE_URL }}
          API_BASE_URL_VAR: ${{ vars.API_BASE_URL }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL_SECRET:-$NEXT_PUBLIC_API_URL_VAR}"
          NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL_SECRET:-$NEXT_PUBLIC_API_BASE_URL_VAR}"
          API_BASE_URL="${API_BASE_URL_SECRET:-$API_BASE_URL_VAR}"

          if [ -z "$API_BASE_URL" ] && [ -n "$BACKEND_HEALTH_URL" ]; then
            API_BASE_URL="${BACKEND_HEALTH_URL%/api/health/}"
            API_BASE_URL="${API_BASE_URL%/api/health}"
          fi

          # Sanitize: strip common path suffixes that shouldn't be in the base URL
          for var in API_BASE_URL NEXT_PUBLIC_API_BASE_URL NEXT_PUBLIC_API_URL; do
            eval "val=\$$var"
            val="${val%/}"
            val="${val%/api/health}"
            val="${val%/api/health/}"
            eval "$var=\$val"
          done

          if [ -z "$NEXT_PUBLIC_API_BASE_URL" ] && [ -n "$API_BASE_URL" ]; then
            NEXT_PUBLIC_API_BASE_URL="${API_BASE_URL%/api}"
          fi

          if [ -z "$NEXT_PUBLIC_API_BASE_URL" ] && [ -n "$NEXT_PUBLIC_API_URL" ]; then
            NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_URL%/api}"
          fi
          if [ -z "$NEXT_PUBLIC_API_URL" ] && [ -n "$NEXT_PUBLIC_API_BASE_URL" ]; then
            NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_BASE_URL%/}/api"
          fi

          if [ -z "$NEXT_PUBLIC_API_URL" ] || [ -z "$NEXT_PUBLIC_API_BASE_URL" ]; then
            echo "Set NEXT_PUBLIC_API_URL/NEXT_PUBLIC_API_BASE_URL in secrets or vars."
            exit 1
          fi
          echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL" >> "$GITHUB_ENV"

      - name: Build Next.js standalone
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir -p deploy

          # Handle both flat and monorepo standalone output structures
          if [ -f .next/standalone/server.js ]; then
            echo "Detected flat standalone structure"
            cp -r .next/standalone/. deploy/
          elif [ -f .next/standalone/saramsa-ai/server.js ]; then
            echo "Detected monorepo standalone structure"
            cp -r .next/standalone/saramsa-ai/. deploy/
            # Copy shared node_modules from standalone root if present
            if [ -d .next/standalone/node_modules ]; then
              cp -rn .next/standalone/node_modules/. deploy/node_modules/ 2>/dev/null || true
            fi
          else
            echo "ERROR: Could not find server.js in standalone output"
            echo "Standalone contents:"
            find .next/standalone -maxdepth 3 -type f | head -30
            exit 1
          fi

          # Copy static assets (required for standalone mode)
          cp -r .next/static deploy/.next/static

          # Copy public directory if it exists
          cp -r public deploy/public 2>/dev/null || true

          # Verify server.js exists in the deploy directory
          if [ ! -f deploy/server.js ]; then
            echo "ERROR: server.js not found in deploy directory"
            ls -la deploy/
            exit 1
          fi

          echo "Deploy directory contents:"
          ls -la deploy/
          echo "server.js found - package ready"

          cd deploy
          zip -1 -r ../frontend.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'saramsa-fe'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_FE_PUBLISH_PROFILE }}
          package: saramsa-ai/frontend.zip

      - name: Verify frontend health
        env:
          FRONTEND_HEALTH_URL: ${{ secrets.FRONTEND_HEALTH_URL }}
        run: |
          if [ -z "$FRONTEND_HEALTH_URL" ]; then
            FRONTEND_HEALTH_URL="https://saramsa-fe.azurewebsites.net"
            echo "FRONTEND_HEALTH_URL not set; falling back to $FRONTEND_HEALTH_URL"
          fi

          echo "Checking frontend health at $FRONTEND_HEALTH_URL"
          for i in 1 2 3; do
            if curl -fsS "$FRONTEND_HEALTH_URL"; then
              echo "Frontend health check succeeded."
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "Frontend health check failed after 3 attempts."
          exit 1
