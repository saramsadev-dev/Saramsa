name: Saramsa-celery (master)

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/master_saramsa-celery.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Note: Celery workers should NOT run migrations
      # Migrations should only run on the backend API service

      - name: Create deployment bundle
        run: |
          mkdir -p ../artifact
          rm -f ../artifact/celery.zip
          # Create artifact from backend directory (same codebase)
          zip -r ../artifact/celery.zip . -x 'venv/*' '*/venv/*' '*__pycache__*' '*.pyc' 'db.sqlite3*'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9B704E7288154F10948493E64600C219 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_533065BCACC943CFB6DC6E490DE766D1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_62218F3CF0C84559AB8D5FF7DC281D84 }}

      - name: Stop Azure Web App (Celery Worker)
        run: |
          # Get resource group from app
          RG=$(az webapp show --name saramsa-celery --query resourceGroup -o tsv 2>/dev/null || echo "saramsa")
          echo "Resource Group: $RG"
          az webapp stop --name saramsa-celery --resource-group "$RG" || echo "App may already be stopped or not found"
          sleep 10

      - name: Deploy to Azure Web App (Celery Worker)
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'saramsa-celery'
          slot-name: 'Production'
          package: ../artifact/celery.zip
        env:
          API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          ENDPOINT_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT_URL }}
          DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_DEVOPS_ORGANIZATION: ${{ secrets.AZURE_DEVOPS_ORGANIZATION }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}

      - name: Start Azure Web App (Celery Worker)
        run: |
          # Get resource group from app
          RG=$(az webapp show --name saramsa-celery --query resourceGroup -o tsv 2>/dev/null || echo "saramsa")
          az webapp start --name saramsa-celery --resource-group "$RG"

      # Note: Startup command for worker should be set in Azure App Service:
      # celery -A apis worker --loglevel=info --concurrency=1
