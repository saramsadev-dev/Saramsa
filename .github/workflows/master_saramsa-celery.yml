name: Saramsa-celery (master)

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'celery_ops/**'
      - 'Dockerfile.celery'
      - '.github/workflows/master_saramsa-celery.yml'
  workflow_dispatch:

env:
  ACR_NAME: saramsaacr
  ACR_REGISTRY: saramsaacr.azurecr.io
  BASE_IMAGE_REPO: saramsa-celery-base
  APP_IMAGE_REPO: saramsa-celery

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Compute base image tag from requirements hash
        id: hash
        run: |
          TAG=$(cat backend/requirements.txt backend/requirements-ml.txt | sha256sum | cut -c1-16)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5D4B3D5D28E9477FAA936C6524EB3A4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DF861B6FC11548C7BDB03BE8989F7214 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_13ED96C692AA42E5A05EBD10D66B8BDD }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build app image
        run: |
          docker build \
            -f Dockerfile.celery \
            --build-arg BASE_IMAGE=$ACR_REGISTRY/$BASE_IMAGE_REPO:${{ steps.hash.outputs.tag }} \
            -t $ACR_REGISTRY/$APP_IMAGE_REPO:${{ github.sha }} \
            .

      - name: Push app image
        run: docker push $ACR_REGISTRY/$APP_IMAGE_REPO:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'saramsa-celery'
          images: ${{ env.ACR_REGISTRY }}/${{ env.APP_IMAGE_REPO }}:${{ github.sha }}
