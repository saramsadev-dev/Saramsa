name: Saramsa-celery (master)

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/master_saramsa-celery.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django migrations & collectstatic
        env:
          DJANGO_SETTINGS_MODULE: apis.settings
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_ENDPOINT_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT_URL }}
          AZURE_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_DEVOPS_ORGANIZATION: ${{ secrets.AZURE_DEVOPS_ORGANIZATION }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          python manage.py collectstatic --noinput

      # If you want to run tests, add a step here

      - name: Create deployment bundle
        run: |
          mkdir -p ../artifact
          rm -f ../artifact/celery.zip
          zip -r ../artifact/celery.zip . -x 'venv/*' '*/venv/*' '*__pycache__*' '*.pyc'

      - name: Upload celery artifact
        uses: actions/upload-artifact@v4
        with:
          name: celery-build
          path: artifact/celery.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: celery-build
          path: artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5D4B3D5D28E9477FAA936C6524EB3A4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DF861B6FC11548C7BDB03BE8989F7214 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_13ED96C692AA42E5A05EBD10D66B8BDD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'saramsa-celery'
          slot-name: 'Production'
          package: artifact/celery.zip
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_ENDPOINT_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT_URL }}
          AZURE_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_DEVOPS_ORGANIZATION: ${{ secrets.AZURE_DEVOPS_ORGANIZATION }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
