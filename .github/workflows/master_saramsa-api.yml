name: Saramsa-api (master)

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/master_saramsa-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare CI requirements
        run: |
          awk '{
            if ($0 ~ /^-e git\+https:\/\/github.com\/RakeshMahendran\/Saramsa.git@/ && $0 ~ /subdirectory=celery_ops/) {
              next
            } else if ($0 ~ /^torch==/ && $0 ~ /\+/) {
              split($0, a, "==")
              split(a[2], b, "+")
              print "torch==" b[1]
            } else {
              print $0
            }
          }' requirements.txt > requirements.ci.txt

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-api-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            venv-api-py${{ steps.setup-python.outputs.python-version }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.ci.txt

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: apis.settings
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_ENDPOINT_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT_URL }}
          AZURE_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_DEVOPS_ORGANIZATION: ${{ secrets.AZURE_DEVOPS_ORGANIZATION }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          source .venv/bin/activate
          export SECRET_KEY="${SECRET_KEY:-ci-build-secret-key-not-for-prod}"
          export ALLOWED_HOSTS="${ALLOWED_HOSTS:-localhost,127.0.0.1,testserver}"
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required for API tests."
            exit 1
          fi
          python manage.py test --keepdb

      - name: Run Django collectstatic
        env:
          DJANGO_SETTINGS_MODULE: apis.settings
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_ENDPOINT_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT_URL }}
          AZURE_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_DEVOPS_ORGANIZATION: ${{ secrets.AZURE_DEVOPS_ORGANIZATION }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          source .venv/bin/activate
          export SECRET_KEY="${SECRET_KEY:-ci-build-secret-key-not-for-prod}"
          export ALLOWED_HOSTS="${ALLOWED_HOSTS:-localhost,127.0.0.1,testserver}"
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required for collectstatic."
            exit 1
          fi
          python manage.py collectstatic --noinput

      - name: Create deployment bundle
        run: |
          cp requirements.txt requirements.txt.bak
          cp requirements.ci.txt requirements.txt
          mkdir -p ../artifact
          rm -f ../artifact/api.zip
          zip -1 -r ../artifact/api.zip . -x '.venv/*' 'venv/*' '*/venv/*' '*__pycache__*' '*.pyc'
          mv requirements.txt.bak requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7ADE099664754A3C99E76F74337232B6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8CDDA0EE23EE4F6186145892542CA1A2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6E7B017B418A430AB1197545CF11F07F }}

      - name: Wait for any in-progress deployment
        working-directory: .
        run: |
          for i in $(seq 1 6); do
            STATUS=$(az webapp show --name saramsa-api-prod --slot Production \
              --query "siteConfig.publishingState" -o tsv 2>/dev/null || echo "unknown")
            echo "Publishing state: $STATUS"
            if [ "$STATUS" != "Publishing" ]; then
              break
            fi
            echo "Deployment in progress, waiting 30s..."
            sleep 30
          done

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'saramsa-api-prod'
          slot-name: 'Production'
          package: artifact/api.zip

      - name: Verify deployment
        run: |
          echo "Deployment completed. Verifying container health..."
          sleep 10
          az webapp show --name saramsa-api-prod --resource-group saramsa --query "state" -o tsv