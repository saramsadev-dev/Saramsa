name: Celery base image

on:
  push:
    branches:
      - master
    paths:
      - 'backend/requirements.txt'
      - 'backend/requirements-ml.txt'
      - 'Dockerfile.celery-base'
  workflow_dispatch:

env:
  ACR_NAME: saramsaacr
  ACR_REGISTRY: saramsaacr.azurecr.io
  IMAGE_REPO: saramsa-celery-base

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Compute requirements hash
        id: hash
        run: |
          TAG=$(cat backend/requirements.txt backend/requirements-ml.txt | sha256sum | cut -c1-16)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5D4B3D5D28E9477FAA936C6524EB3A4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DF861B6FC11548C7BDB03BE8989F7214 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_13ED96C692AA42E5A05EBD10D66B8BDD }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Check if tag already exists
        id: check
        run: |
          if az acr manifest show \
            --registry $ACR_NAME \
            --name $IMAGE_REPO:${{ steps.hash.outputs.tag }} \
            > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push base image
        if: steps.check.outputs.exists == 'false'
        run: |
          docker build \
            -f Dockerfile.celery-base \
            -t $ACR_REGISTRY/$IMAGE_REPO:${{ steps.hash.outputs.tag }} \
            .
          docker push $ACR_REGISTRY/$IMAGE_REPO:${{ steps.hash.outputs.tag }}

      - name: Skip (tag already exists)
        if: steps.check.outputs.exists == 'true'
        run: echo "Base image $IMAGE_REPO:${{ steps.hash.outputs.tag }} already exists — skipping build."
