name:  Saramsa-backend (master)

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/saramsa-backend.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create and activate venv
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          cd backend
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django migrations & collectstatic
        run: |
          cd backend
          source venv/bin/activate
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: apis.settings
          API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          ENDPOINT_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT_URL }}
          DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_DEVOPS_ORGANIZATION: ${{ secrets.AZURE_DEVOPS_ORGANIZATION }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}

      # If you want to run tests, add a step here

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A78568B067E2452C819ED6A13D01A4F9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1532B4EEFA0A4F7F9278B1BD86DEC6CC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B53E7A385C7D420A8E26E930039D9008 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'saramsa-backend'
          slot-name: 'Production'
          package: '.'
        env:
          API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          ENDPOINT_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT_URL }}
          DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_DEVOPS_ORGANIZATION: ${{ secrets.AZURE_DEVOPS_ORGANIZATION }}
          AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
