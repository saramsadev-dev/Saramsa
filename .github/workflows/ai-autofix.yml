name: AI Auto-Fix (PR on failure)

on:
  workflow_run:
    workflows:
      - Saramsa-backend (master)
      - Saramsa-frontend (master)
      - Saramsa-celery-gpu (master)
      - API Registry Tests
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ai-autofix-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  propose-fix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Determine target SHA
        id: sha
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout failing revision
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 0

      - name: Collect failure context from GitHub API
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const runId = context.payload.workflow_run?.id;
            const workflowName = context.payload.workflow_run?.name || "manual";
            const headSha = context.payload.workflow_run?.head_sha || context.sha;
            const headBranch = context.payload.workflow_run?.head_branch || context.ref.replace("refs/heads/", "");
            let jobs = [];
            if (runId) {
              const res = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}/jobs', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
                per_page: 100,
              });
              jobs = (res.data.jobs || []).map(j => ({
                id: j.id,
                name: j.name,
                conclusion: j.conclusion,
                steps: (j.steps || []).map(s => ({
                  name: s.name,
                  conclusion: s.conclusion,
                  number: s.number,
                })),
              }));
            }
            const ctx = {
              eventName,
              workflowName,
              runId,
              headSha,
              headBranch,
              repo: `${context.repo.owner}/${context.repo.repo}`,
              jobs,
              note: "Logs are not embedded. Use failing step names to guide targeted repro commands.",
            };
            const fs = require('fs');
            fs.writeFileSync('ai_failure_context.json', JSON.stringify(ctx, null, 2));
            core.setOutput('workflow', workflowName);
            core.setOutput('branch', headBranch);
            core.setOutput('sha', headSha);
      - name: Upload failure context for local Codex agent
        uses: actions/upload-artifact@v4
        with:
          name: ai-failure-context-${{ steps.ctx.outputs.workflow }}-${{ steps.ctx.outputs.sha }}
          path: ai_failure_context.json
