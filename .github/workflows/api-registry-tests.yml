name: API Registry Tests

on:
  # Run after deployment completes (avoids race condition where tests run before deploy finishes)
  workflow_run:
    workflows: ["Saramsa-api (master)"]
    types:
      - completed
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/api-registry-tests.yml'
  workflow_dispatch:

jobs:
  api-registry-tests:
    runs-on: ubuntu-latest
    # Only run if deployment succeeded (or if manually triggered / PR)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve API base URL
        env:
          API_BASE_URL_SECRET: ${{ secrets.API_BASE_URL }}
          API_BASE_URL_VAR: ${{ vars.API_BASE_URL }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          # Prefer explicit API base URL; only derive from BACKEND_HEALTH_URL if unset.
          # (Stale BACKEND_HEALTH_URL must not override a correct API_BASE_URL secret.)
          API_BASE_URL="${API_BASE_URL_SECRET:-$API_BASE_URL_VAR}"
          if [ -z "$API_BASE_URL" ] && [ -n "$BACKEND_HEALTH_URL" ]; then
            API_BASE_URL="${BACKEND_HEALTH_URL%/api/health/}"
            API_BASE_URL="${API_BASE_URL%/api/health}"
          fi

          # Ensure https scheme
          if [ -n "$API_BASE_URL" ] && [[ ! "$API_BASE_URL" =~ ^https?:// ]]; then
            API_BASE_URL="https://$API_BASE_URL"
          fi
          if [[ "$API_BASE_URL" =~ ^http:// ]]; then
            API_BASE_URL="https://${API_BASE_URL#http://}"
          fi

          # Strip trailing slash
          API_BASE_URL="${API_BASE_URL%/}"

          if [ -z "$API_BASE_URL" ]; then
            echo "::error::API_BASE_URL is not set. Configure one of: secrets.API_BASE_URL, vars.API_BASE_URL, or secrets.BACKEND_HEALTH_URL"
            exit 1
          fi

          echo "API_BASE_URL=$API_BASE_URL" >> "$GITHUB_ENV"
          echo "Resolved API_BASE_URL (length=${#API_BASE_URL})"

      - name: Verify backend is reachable
        run: |
          echo "Checking backend health at: $API_BASE_URL/api/health/"
          echo "Note: Azure App Service may need time to warm up from cold start..."

          # Retry up to 3 times with 30-second timeout each (handles cold starts)
          MAX_RETRIES=3
          RETRY_DELAY=10
          TIMEOUT=30

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            set +e
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time $TIMEOUT "$API_BASE_URL/api/health/")
            curl_exit=$?
            set -e

            if [ "$curl_exit" -ne 0 ]; then
              HTTP_CODE="000"
            fi

            if [ "$HTTP_CODE" = "000" ]; then
              echo "⚠️  Backend unreachable (attempt $i/$MAX_RETRIES)"
              if [ "$i" -lt "$MAX_RETRIES" ]; then
                echo "Waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
              fi
            else
              echo "✅ Backend responded with HTTP $HTTP_CODE"
              break
            fi
          done

          if [ "$HTTP_CODE" = "000" ]; then
            echo "::error::Backend is unreachable at $API_BASE_URL/api/health/ after $MAX_RETRIES attempts — check that the server is running and the URL is correct."
            exit 1
          fi

      - name: Sync registry from Swagger
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
        run: python scripts/sync_api_registry_from_swagger.py

      - name: Run API registry tests
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/test_api_registry.py --notify-slack
