name: API Registry Tests

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/api-registry-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/api-registry-tests.yml'
  workflow_dispatch:

jobs:
  api-registry-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync registry from Swagger
        env:
          API_BASE_URL_SECRET: ${{ secrets.API_BASE_URL }}
          API_BASE_URL_VAR: ${{ vars.API_BASE_URL }}
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          if [ -n "$BACKEND_HEALTH_URL" ]; then
            API_BASE_URL="${BACKEND_HEALTH_URL%/api/health/}"
            API_BASE_URL="${API_BASE_URL%/api/health}"
          else
            API_BASE_URL="${API_BASE_URL_SECRET:-$API_BASE_URL_VAR}"
          fi
          if [ -n "$API_BASE_URL" ] && [[ ! "$API_BASE_URL" =~ ^https?:// ]]; then
            API_BASE_URL="https://$API_BASE_URL"
          fi
          if [[ "$API_BASE_URL" =~ ^http:// ]]; then
            API_BASE_URL="https://${API_BASE_URL#http://}"
          fi
          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL is not set in secrets/vars and BACKEND_HEALTH_URL fallback is unavailable."
            exit 1
          fi
          echo "API_BASE_URL=$API_BASE_URL" >> "$GITHUB_ENV"
          python scripts/sync_api_registry_from_swagger.py

      - name: Run API registry tests (notify Slack on failures)
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL is not set; failing API registry workflow."
            exit 1
          fi
          python scripts/test_api_registry.py --notify-slack
